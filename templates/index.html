<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Translation App</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Audio Translation App</h1>
        
        <div class="controls">
            <button id="start-button" class="btn">Start Recording</button>
            <button id="stop-button" class="btn" disabled>Stop Recording</button>
        </div>
        
        <div class="status-container">
            <p id="status">Ready to record</p>
        </div>
        
        <div class="results-container">
            <div class="result-box">
                <h2>Transcription</h2>
                <p id="transcription">No transcription yet</p>
            </div>
            
            <div class="result-box">
                <h2>Translation</h2>
                <p id="translation">No translation yet</p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/microphone.js"></script>
</body>
</html>
