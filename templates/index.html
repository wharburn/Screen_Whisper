<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>
<body class="bg-black min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto bg-gray-900 rounded-lg shadow-xl p-6 border border-gray-800">
            <!-- Header with Logo and Start Button -->
            <div class="flex justify-between items-center mb-6">
                <div class="w-48">
                    <img src="/static/images/SWlogo.png" alt="ScreenWhisper Logo" class="h-12 w-auto">
                </div>
                <div class="flex space-x-2">
                    <button id="debugButton" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 transition text-sm">
                        Debug
                    </button>
                    <button id="startButton" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
                        Start Listening
                    </button>
                </div>
            </div>
            
            <!-- Language Selection -->
            <div class="mb-6">
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-300 mb-2">Source Language</label>
                        <select id="sourceLanguage" class="w-full p-2 border rounded bg-gray-800 text-white border-gray-700">
                            <option value="en-US">English (US)</option>
                            <option value="es-ES">Spanish</option>
                            <option value="fr-FR">French</option>
                            <option value="de-DE">German</option>
                            <option value="it-IT">Italian</option>
                            <option value="ja-JP">Japanese</option>
                            <option value="ko-KR">Korean</option>
                            <option value="zh-CN">Chinese (Simplified)</option>
                            <option value="ru-RU">Russian</option>
                            <option value="pt-BR">Portuguese (Brazil)</option>
                            <option value="nl-NL">Dutch</option>
                            <option value="pl-PL">Polish</option>
                            <option value="tr-TR">Turkish</option>
                            <option value="uk-UA">Ukrainian</option>
                            <option value="bg-BG">Bulgarian</option>
                            <option value="cs-CZ">Czech</option>
                            <option value="da-DK">Danish</option>
                            <option value="el-GR">Greek</option>
                            <option value="et-EE">Estonian</option>
                            <option value="fi-FI">Finnish</option>
                            <option value="hu-HU">Hungarian</option>
                            <option value="id-ID">Indonesian</option>
                            <option value="lt-LT">Lithuanian</option>
                            <option value="lv-LV">Latvian</option>
                            <option value="nb-NO">Norwegian</option>
                            <option value="ro-RO">Romanian</option>
                            <option value="sk-SK">Slovak</option>
                            <option value="sl-SI">Slovenian</option>
                            <option value="sv-SE">Swedish</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-300 mb-2">Target Language</label>
                        <select id="targetLanguage" class="w-full p-2 border rounded bg-gray-800 text-white border-gray-700">
                            <option value="EN">English</option>
                            <option value="ES">Spanish</option>
                            <option value="FR">French</option>
                            <option value="DE">German</option>
                            <option value="IT">Italian</option>
                            <option value="JA">Japanese</option>
                            <option value="KO">Korean</option>
                            <option value="ZH">Chinese</option>
                            <option value="RU">Russian</option>
                            <option value="PT">Portuguese</option>
                            <option value="NL">Dutch</option>
                            <option value="PL">Polish</option>
                            <option value="TR">Turkish</option>
                            <option value="UK">Ukrainian</option>
                            <option value="BG">Bulgarian</option>
                            <option value="CS">Czech</option>
                            <option value="DA">Danish</option>
                            <option value="EL">Greek</option>
                            <option value="ET">Estonian</option>
                            <option value="FI">Finnish</option>
                            <option value="HU">Hungarian</option>
                            <option value="ID">Indonesian</option>
                            <option value="LT">Lithuanian</option>
                            <option value="LV">Latvian</option>
                            <option value="NB">Norwegian</option>
                            <option value="RO">Romanian</option>
                            <option value="SK">Slovak</option>
                            <option value="SL">Slovenian</option>
                            <option value="SV">Swedish</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Status and Error Messages -->
            <div id="statusMessage" class="mb-6 p-4 rounded hidden"></div>

            <!-- Translation Display -->
            <div class="space-y-4">
                <div class="p-4 bg-gray-800 rounded border border-gray-700">
                    <h3 class="font-medium mb-2 text-gray-300">Translation (<span id="targetLanguageDisplay"></span>)</h3>
                    <div id="currentTranslation" class="text-lg font-medium text-white"></div>
                    <h3 class="font-medium mt-4 mb-2 text-gray-300">Source (<span id="sourceLanguageDisplay"></span>)</h3>
                    <div id="currentRecognition" class="text-gray-400 italic"></div>
                </div>
                
                <div class="p-4 bg-gray-800 rounded border border-gray-700">
                    <h3 class="font-medium mb-2 text-gray-300">Translation History</h3>
                    <div id="translationHistory" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Debug logging setup
        const DEBUG = true;
        function debugLog(message, data = null) {
            if (DEBUG) {
                if (data) {
                    console.log(`[DEBUG] ${message}:`, data);
                } else {
                    console.log(`[DEBUG] ${message}`);
                }
            }
        }

        // Socket.io setup with debug
        const socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        let isListening = false;
        let mediaStream = null;

        // UI elements
        const startButton = document.getElementById('startButton');
        const debugButton = document.getElementById('debugButton');
        const sourceSelect = document.getElementById('sourceLanguage');
        const targetSelect = document.getElementById('targetLanguage');
        const currentRecognition = document.getElementById('currentRecognition');
        const currentTranslation = document.getElementById('currentTranslation');
        const translationHistory = document.getElementById('translationHistory');
        const statusMessage = document.getElementById('statusMessage');
        const sourceLanguageDisplay = document.getElementById('sourceLanguageDisplay');
        const targetLanguageDisplay = document.getElementById('targetLanguageDisplay');

        // Debug functionality
        debugButton.addEventListener('click', () => {
            debugLog('Debug button clicked');
            
            // Test translation display
            const testData = {
                original: "Test original text",
                translated: "Test translated text",
                source_lang: "EN",
                target_lang: "ES"
            };
            
            // Manually trigger translation event
            debugLog('Manually triggering translation event with:', testData);
            currentTranslation.textContent = testData.translated;
            
            // Add to history
            const historyItem = document.createElement('div');
            historyItem.className = 'p-2 bg-gray-700 rounded shadow border border-gray-600';
            historyItem.innerHTML = `
                <div class="text-sm text-gray-400">${testData.original}</div>
                <div class="font-medium text-white">${testData.translated}</div>
            `;
            translationHistory.insertBefore(historyItem, translationHistory.firstChild);
            
            // Show debug info
            showStatus('Debug: Translation display test completed', 'info');
            
            // Log connection status
            debugLog('Socket connected:', socket.connected);
            debugLog('Socket ID:', socket.id);
            
            // Check microphone status
            if (mediaStream) {
                debugLog('Media stream active:', mediaStream.active);
                debugLog('Media tracks:', mediaStream.getTracks().map(track => ({
                    kind: track.kind,
                    label: track.label,
                    enabled: track.enabled,
                    muted: track.muted,
                    readyState: track.readyState
                })));
            } else {
                debugLog('No media stream active');
            }
        });

        // Update language displays
        function updateLanguageDisplays() {
            sourceLanguageDisplay.textContent = sourceSelect.options[sourceSelect.selectedIndex].text;
            targetLanguageDisplay.textContent = targetSelect.options[targetSelect.selectedIndex].text;
            debugLog('Language displays updated', {
                source: sourceLanguageDisplay.textContent,
                target: targetLanguageDisplay.textContent
            });
        }

        sourceSelect.addEventListener('change', updateLanguageDisplays);
        targetSelect.addEventListener('change', updateLanguageDisplays);
        updateLanguageDisplays();

        function showStatus(message, type = 'info') {
            debugLog(`Status: ${message} (${type})`);
            statusMessage.textContent = message;
            statusMessage.className = `mb-6 p-4 rounded ${type === 'error' ? 'bg-red-900 text-red-200' : 'bg-blue-900 text-blue-200'}`;
            statusMessage.classList.remove('hidden');
            
            if (type === 'info') {
                setTimeout(() => {
                    if (statusMessage.textContent === message) {
                        hideStatus();
                    }
                }, 5000);
            }
        }

        function hideStatus() {
            statusMessage.classList.add('hidden');
        }

        // Handle start/stop button click
        startButton.addEventListener('click', async () => {
            debugLog('Start/Stop button clicked', { isListening });
            
            if (!isListening) {
                try {
                    startButton.disabled = true;
                    startButton.textContent = 'Initializing...';
                    showStatus('Initializing microphone...', 'info');
                    
                    // Request microphone permission with specific constraints for mobile
                    const constraints = {
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    };
                    
                    debugLog('Requesting microphone access with constraints:', constraints);
                    mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    debugLog('Microphone access granted', {
                        active: mediaStream.active,
                        tracks: mediaStream.getTracks().map(track => ({
                            kind: track.kind,
                            label: track.label,
                            enabled: track.enabled,
                            muted: track.muted,
                            readyState: track.readyState
                        }))
                    });
                    
                    // Don't stop the tracks immediately - keep them active
                    // This is important for mobile devices
                    showStatus('Connecting to translation service...', 'info');
                    
                    // Start listening with selected languages
                    const languageData = {
                        source_lang: sourceSelect.value,
                        target_lang: targetSelect.value
                    };
                    debugLog('Emitting start_stream event with data:', languageData);
                    socket.emit('start_stream', languageData);
                    
                    isListening = true;
                    startButton.textContent = 'Stop Listening';
                    startButton.disabled = false;
                    showStatus('Listening started', 'info');
                } catch (error) {
                    debugLog('Error starting microphone:', error);
                    console.error('Error starting microphone:', error);
                    let errorMessage = 'Error: ';
                    if (error.name === 'NotAllowedError') {
                        errorMessage += 'Microphone access denied. Please allow microphone access and try again.';
                    } else if (error.name === 'NotFoundError') {
                        errorMessage += 'No microphone found. Please connect a microphone and try again.';
                    } else {
                        errorMessage += error.message;
                    }
                    showStatus(errorMessage, 'error');
                    startButton.disabled = false;
                    startButton.textContent = 'Start Listening';
                }
            } else {
                debugLog('Stopping listening');
                socket.emit('stop_stream');
                
                // Stop all tracks in the media stream
                if (mediaStream) {
                    debugLog('Stopping media stream tracks');
                    mediaStream.getTracks().forEach(track => {
                        track.stop();
                        debugLog(`Track stopped: ${track.label}`);
                    });
                    mediaStream = null;
                }
                
                isListening = false;
                startButton.textContent = 'Start Listening';
                showStatus('Listening stopped', 'info');
            }
        });

        // Handle real-time recognition updates
        socket.on('recognition', (data) => {
            debugLog('Received recognition:', data);
            if (data.is_final) {
                currentRecognition.textContent = data.text;
                debugLog('Updated recognition (final):', data.text);
            } else {
                currentRecognition.textContent = data.text + '...';
                debugLog('Updated recognition (interim):', data.text + '...');
            }
        });

        // Handle translations with debug logging
        socket.on('translation', (data) => {
            debugLog('Received translation event:', data);
            
            // Force update the DOM to ensure the translation is displayed
            requestAnimationFrame(() => {
                // Update current translation
                if (data && data.translated) {
                    debugLog('Updating current translation to:', data.translated);
                    currentTranslation.textContent = data.translated;
                    
                    // Add to history
                    const historyItem = document.createElement('div');
                    historyItem.className = 'p-2 bg-gray-700 rounded shadow border border-gray-600';
                    historyItem.innerHTML = `
                        <div class="text-sm text-gray-400">${data.original || ''}</div>
                        <div class="font-medium text-white">${data.translated || ''}</div>
                    `;
                    translationHistory.insertBefore(historyItem, translationHistory.firstChild);
                    debugLog('Added translation to history');

                    // Limit history items
                    if (translationHistory.children.length > 10) {
                        translationHistory.removeChild(translationHistory.lastChild);
                        debugLog('Removed oldest history item');
                    }
                    
                    // Force a reflow to ensure the UI updates
                    currentTranslation.offsetHeight;
                    debugLog('Forced UI reflow');
                } else {
                    debugLog('Translation data is missing or invalid:', data);
                    console.warn('Translation data is missing or invalid:', data);
                }
            });
        });

        // Handle errors
        socket.on('error', (data) => {
            debugLog('Received error event:', data);
            console.error('Received error:', data);
            showStatus(data.message, 'error');
            if (startButton.disabled) {
                startButton.disabled = false;
                startButton.textContent = 'Start Listening';
            }
        });

        // Handle connection events
        socket.on('connect', () => {
            debugLog('Connected to server');
            console.log('Connected to server');
            showStatus('Connected to server', 'info');
        });

        socket.on('disconnect', () => {
            debugLog('Disconnected from server');
            console.log('Disconnected from server');
            showStatus('Disconnected from server', 'error');
            isListening = false;
            startButton.textContent = 'Start Listening';
        });

        socket.on('connect_error', (error) => {
            debugLog('Connection error:', error);
            console.error('Connection error:', error);
            showStatus(`Connection error: ${error.message}`, 'error');
        });
    </script>
</body>
</html>
